services:
  db:
    image: postgres:15-alpine
    container_name: myfetus-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER:?PG_USER nao configurada}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD nao configurada}
      POSTGRES_DB: ${PG_DATABASE:?PG_DATABASE nao configurada}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./apps/api/db/create_tables.sql:/docker-entrypoint-initdb.d/1_create_tables.sql:ro
      - ./apps/api/db/triggers.sql:/docker-entrypoint-initdb.d/2_triggers.sql:ro
      - ./apps/api/db/migration.sql:/docker-entrypoint-initdb.d/3_migration.sql:ro
      - ./apps/api/db/migration_sprint6_history.sql:/docker-entrypoint-initdb.d/4_migration_sprint6_history.sql:ro
      - ./apps/api/db/doctor_patient_links.sql:/docker-entrypoint-initdb.d/4_doctor_patient_links.sql:ro
      - ./apps/api/db/migration_security_baseline.sql:/docker-entrypoint-initdb.d/5_security_baseline.sql:ro
      - ./apps/api/db/migration_aes_encryption.sql:/docker-entrypoint-initdb.d/6_aes_encryption.sql:ro
      - ./apps/api/db/migration_document_security.sql:/docker-entrypoint-initdb.d/7_document_security.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myfetus-net


  backend:
    build:
      context: ./apps/api
    container_name: myfetus-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PG_HOST: db
      PG_PORT: 5432

    ports:
      - "3000:3000"
    command: ["node", "server.js"]
    volumes:
      - ./apps/api:/app  
      - /app/node_modules
    working_dir: /app
    networks:
      - myfetus-net
    restart: always


volumes:
  db_data:

networks:
  myfetus-net:
    driver: bridge
