services:
  db:
    image: postgres:15-alpine
    container_name: myfetus-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./apps/api/db/create_tables.sql:/docker-entrypoint-initdb.d/1_create_tables.sql:ro
      - ./apps/api/db/triggers.sql:/docker-entrypoint-initdb.d/2_triggers.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myfetus-net


  backend:
    build:
      context: ./apps/api
    container_name: myfetus-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_USER: myuser
      PG_PASSWORD: mypassword
      PG_DATABASE: mydatabase
      PG_HOST: db
      PG_PORT: 5432
      PORT: 3000

    # teste JWT e CORS
      JWT_SECRET: uma_chave_grande_de_teste
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:8081,http://localhost:19006,http://localhost:3000
      OCR_LANGUAGES: por+eng
      PDF_TEXT_MIN_LENGTH_FOR_OCR: 50
      DOCUMENT_EXTRACTION_BATCH_SIZE: 5
      DOCUMENT_EXTRACTION_INTERVAL_MS: 30000
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-myfetus-documents}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-us-east-1-aws}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-text-embedding-3-small}
      EMBEDDINGS_DIMENSION: ${EMBEDDINGS_DIMENSION:-1536}
      VECTOR_CHUNK_SIZE: ${VECTOR_CHUNK_SIZE:-500}
      VECTOR_CHUNK_OVERLAP: ${VECTOR_CHUNK_OVERLAP:-50}

    ports:
      - "3000:3000"
    command: ["node", "server.js"]
    volumes:
      - ./apps/api:/app  
      - /app/node_modules
    working_dir: /app
    networks:
      - myfetus-net
    restart: always


volumes:
  db_data:

networks:
  myfetus-net:
    driver: bridge
